name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # ou master, dependendo do nome da sua branch principal

  # Permite rodar o workflow manualmente a partir da aba Actions
  workflow_dispatch:

# Define as permissões necessárias para o token GITHUB_TOKEN
permissions:
  contents: read
  pages: write
  id-token: write

# Permite apenas um deploy simultâneo para evitar conflitos
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Construir o projeto (Build)
        run: npm run build

      - name: Configurar o GitHub Pages
        uses: actions/configure-pages@v4

      - name: Carregar artefato do build
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy para o GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
